---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
  creationTimestamp: null
  name: conditions.iot.iot
spec:
  group: iot.iot
  names:
    kind: Condition
    listKind: ConditionList
    plural: conditions
    singular: condition
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Condition is the Schema for the conditions API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: ConditionSpec defines the desired state of Condition
            properties:
              enabled:
                type: boolean
              matches:
                items:
                  properties:
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                  type: object
                type: array
              name:
                type: string
              remediations:
                items:
                  description: 'Remediation describes what to do to a zone when a
                    condition matches: which zone, active/inactive state and scene,
                    optional WhenGate (epoch window), and optional TimeIntervals (alert
                    windows).'
                  properties:
                    active_brightness_delta:
                      description: "ActiveBrightnessDelta applies a relative brightness
                        change instead of (or in addition to) an absolute ActiveState/ActiveScene.
                        Positive walks the Brightness enum up N steps (toward BRIGHTNESS_FULL);
                        negative walks down. Clamped at the enum boundaries. \n Bypasses
                        the conditioner's applyDesired cache — each fire takes effect,
                        regardless of whether the previous fire targeted the same
                        value. This is the right semantic for \"press to brighten\":
                        repeated presses must each bump one step. \n When set alongside
                        ActiveState=on or unset state, the side effect of the underlying
                        RPC also sets the zone to ON if it was OFF (\"press brighter
                        on a dark room → turn on at the new level\")."
                      type: integer
                    active_compute:
                      description: "ActiveCompute is the name of a registered Computer
                        whose result is used to drive the zone at evaluation time.
                        On each evaluator tick (cfg.EvaluationInterval) the Conditioner
                        invokes the named computer with `(now, location, lastApplied,
                        args)` and applies the returned ApplyValues tuple via the
                        ZoneKeeper.ApplyValues RPC. \n Computers are Go code registered
                        at startup — there is no user- authored expression language
                        here. Built-in computers ship with the controller; adding
                        a new one is a code change. \n Initial set: \"sun_color_temperature\"
                        — Brightness/ColorTemperature based on the current solar position
                        for the configured (lat, lon). \n When set, the Remediation
                        is evaluated every tick regardless of external triggers (it's
                        \"always-on\"). ActiveCompute is independent of ActiveState/ActiveScene
                        — set them too if you want the eval loop to apply a Scene
                        first and then layer the computer's output on top (most computers
                        will be partial: e.g. sun_color_temperature only sets ColorTemperature,
                        leaving brightness and state untouched)."
                      type: string
                    active_compute_args:
                      additionalProperties:
                        type: string
                      description: ActiveComputeArgs are passed verbatim to the named
                        Computer. The schema is computer-defined; consult the Computer's
                        documentation for the supported keys.
                      type: object
                    active_scene:
                      type: string
                    active_state:
                      type: string
                    inactive_scene:
                      type: string
                    inactive_state:
                      type: string
                    time_intervals:
                      description: TimeIntervals define the windows during which this
                        remediation is applicable for Alerts.  If the conditioner
                        receives an event outside of this range, the zone will be
                        set to the inactive state, if defined in the condition spec.
                      items:
                        description: TimeIntervalSpec mirrors the JSON/YAML *input*
                          format expected by Prometheus.
                        properties:
                          daysOfMonth:
                            description: DaysOfMonth accepts strings like "1", "-1"
                              (last day), "1:5".
                            items:
                              type: string
                            type: array
                          location:
                            description: Location is the IANA Timezone string (e.g.
                              "America/New_York").
                            type: string
                          months:
                            description: Months accepts strings like "january", "march:may".
                            items:
                              type: string
                            type: array
                          sun_relative:
                            description: "SunRelative defines time windows relative
                              to the current day's solar events at the conditioner's
                              configured (lat, lon). Multiple SunWindow entries OR
                              together with each other and with Times. \n A SunWindow
                              with Event=sunset, Before=30m, After=12h opens 30m before
                              sunset and stays open for 12.5 h — typically spanning
                              midnight into the next morning. The window is treated
                              as a single continuous [start, end] span (no wrap-around
                              split), so callers observing \"is now in the window?\"
                              semantics get the intuitive answer for evening-into-morning
                              patterns."
                            items:
                              description: SunWindow defines a time span anchored
                                to a daily solar event.
                              properties:
                                after:
                                  description: After is how long after the event the
                                    window stays open. Zero (or unset) means the window
                                    closes at the event itself (i.e. an instantaneous
                                    window — generally not useful; set at least one
                                    of Before/After to a non-zero value).
                                  type: string
                                before:
                                  description: Before is how long before the event
                                    the window opens. Zero (or unset) means the window
                                    opens at the event itself.
                                  type: string
                                event:
                                  description: 'Event is the anchor: "sunrise", "sunset",
                                    "noon", or "midnight". Names match the go-sunrise
                                    library convention; "midnight" is solar midnight,
                                    not 00:00 local time.'
                                  type: string
                              required:
                              - event
                              type: object
                            type: array
                          times:
                            description: Times is a list of start/end times. We use
                              a local struct here to ensure deepcopy generation works.
                            items:
                              description: TimePeriod defines a time range within
                                a day. StartTime and EndTime use "HH:MM" format (24-hour).
                                Mirrors the upstream Prometheus timeinterval format.
                              properties:
                                end_time:
                                  type: string
                                start_time:
                                  type: string
                              required:
                              - end_time
                              - start_time
                              type: object
                            type: array
                          weekdays:
                            description: Weekdays accepts strings like "monday", "saturday",
                              "monday:wednesday".
                            items:
                              type: string
                            type: array
                          years:
                            description: Years accepts strings like "2023", "2023:2025".
                            items:
                              type: string
                            type: array
                        type: object
                      type: array
                    when_gate:
                      description: WhenGate is relative to the Epoch event and is
                        used to create an activation window. When the window opens,
                        the zone is activated; when the window closes, the zone is
                        deactivated.
                      properties:
                        start:
                          type: string
                        stop:
                          type: string
                      type: object
                    zone:
                      type: string
                  type: object
                type: array
              schedule:
                description: 'A cron string: * * * * *'
                type: string
            type: object
          status:
            description: ConditionStatus defines the observed state of Condition
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
