---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
  creationTimestamp: null
  name: bindings.iot.iot
spec:
  group: iot.iot
  names:
    kind: Binding
    listKind: BindingList
    plural: bindings
    singular: binding
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Binding maps a normalized device event to a Condition. When the
          event fires from a device matching the selector, the named Condition's remediations
          are applied to its zones. This replaces hardcoded action strings in the
          router.
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: BindingSpec defines an event → condition mapping. When the
              trigger event fires from a device matching the selector, the named Condition
              is activated.
            properties:
              condition:
                description: Condition is the name of the Condition resource to activate
                  when this binding fires. The Condition must exist in the same namespace.
                type: string
              event:
                description: Event matches a normalized device-emitted event by property
                  and value. Both zigbee2mqtt and the native zigbee router normalize
                  their incoming messages into the same Event shape so a single Binding
                  works regardless of transport.
                properties:
                  property:
                    description: 'Property is the normalized expose name. Examples:
                      "action", "occupancy", "water_leak", "state", "contact", "tamper".'
                    type: string
                  selector:
                    description: Selector restricts which devices can fire this binding.
                      All non-empty fields must match the device. An empty selector
                      matches every device that emitted the property.
                    properties:
                      device:
                        description: Device matches the device's CR name.
                        type: string
                      device_type:
                        description: DeviceType matches Spec.Type (e.g. "DEVICE_TYPE_BUTTON").
                        type: string
                      ieee:
                        description: IEEE matches the device's 64-bit IEEE address
                          (e.g. "0xffffb40e06036411").
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: LabelSelector is an exact-match label set. Every
                          key/value here must be present on the Device for the binding
                          to fire.
                        type: object
                      zone:
                        description: Zone matches the device's `iot/zone` label.
                        type: string
                    type: object
                  value:
                    description: Value is the expected value rendered as a string.
                      For booleans use "true" / "false". For action enums use the
                      action name (e.g. "single", "double", "on"). May be empty to
                      match any value of the property.
                    type: string
                required:
                - property
                type: object
            required:
            - condition
            - event
            type: object
          status:
            description: BindingStatus defines the observed state of Binding.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
