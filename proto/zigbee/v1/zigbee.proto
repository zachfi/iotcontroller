syntax = "proto3";

package zigbee.v1;

// Zigbee Network Types
// These types represent Zigbee network state and configuration.
// They provide a unified abstraction that works across different Zigbee stack implementations
// (Ember/EZSP, Z-Stack/ZNP, etc.) and can be used for gRPC services.

// NetworkState represents the current state of a Zigbee network node.
// Based on EmberNetworkStatus from EmberZNet/EZSP (values 0-6) and DeviceState from Z-Stack.
// This is a unified abstraction that maps both Ember and Z-Stack states.
enum NetworkState {
  NETWORK_STATE_UNSPECIFIED = 0;
  // The node is not associated with a network in any way.
  // Maps to: EmberNetworkStatus.NO_NETWORK (0), Z-Stack DeviceState.InitializedNotStarted
  NETWORK_STATE_NO_NETWORK = 1;
  // The node is currently attempting to join a network.
  // Maps to: EmberNetworkStatus.JOINING_NETWORK (1), Z-Stack DeviceState.Joining
  NETWORK_STATE_JOINING_NETWORK = 2;
  // The node is joined to a network and operational.
  // Maps to: EmberNetworkStatus.JOINED_NETWORK (2), Z-Stack DeviceState.Coordinator/Router/EndDevice
  NETWORK_STATE_JOINED_NETWORK = 3;
  // The node is an end device joined to a network but its parent is not responding.
  // Maps to: EmberNetworkStatus.JOINED_NETWORK_NO_PARENT (3), Z-Stack DeviceState.Orphan
  NETWORK_STATE_JOINED_NETWORK_NO_PARENT = 4;
  // The node is in the process of leaving its current network.
  // Maps to: EmberNetworkStatus.LEAVING_NETWORK (6)
  NETWORK_STATE_LEAVING_NETWORK = 5;
}

// NetworkInfo contains information about the current Zigbee network state.
message NetworkInfo {
  uint32 short_address = 1;           // 16-bit network address (node ID)
  uint32 pan_id = 2;                  // 16-bit PAN ID
  uint32 parent_address = 3;          // 16-bit parent node address
  uint64 extended_pan_id = 4;         // 64-bit Extended PAN ID
  uint64 extended_parent_address = 5; // 64-bit Extended Parent Address (EUI64)
  uint32 channel = 6;                 // Radio channel (11-26 for 2.4GHz)
  NetworkState state = 7;             // Current network state
}

// NetworkParameters defines the parameters for forming or joining a Zigbee network.
// These parameters must be consistent across device swaps to maintain the same network.
message NetworkParameters {
  uint32 pan_id = 1;                  // 16-bit PAN ID
  uint64 extended_pan_id = 2;          // 64-bit Extended PAN ID
  uint32 channel = 3;                  // Radio channel (11-26 for 2.4GHz)
  bytes network_key = 4;               // 128-bit (16 bytes) Network Key for encryption
}

// PersistedNetworkState represents the network state saved to disk.
// This allows the same network to be restored when swapping devices.
message PersistedNetworkState {
  uint32 pan_id = 1;
  uint64 extended_pan_id = 2;
  uint32 channel = 3;
  bytes network_key = 4;
}

// InterviewState represents the state of a device interview process.
enum InterviewState {
  INTERVIEW_STATE_UNSPECIFIED = 0;
  INTERVIEW_STATE_PENDING = 1;      // Interview not yet started
  INTERVIEW_STATE_IN_PROGRESS = 2; // Interview currently in progress
  INTERVIEW_STATE_SUCCESSFUL = 3;   // Interview completed successfully
  INTERVIEW_STATE_FAILED = 4;       // Interview failed
}

// DeviceType represents the type of Zigbee device.
enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_COORDINATOR = 1;
  DEVICE_TYPE_ROUTER = 2;
  DEVICE_TYPE_END_DEVICE = 3;
}

// PowerSource represents the power source of a Zigbee device.
enum PowerSource {
  POWER_SOURCE_UNSPECIFIED = 0;
  POWER_SOURCE_UNKNOWN = 1;
  POWER_SOURCE_MAINS = 2;    // Mains power (single phase)
  POWER_SOURCE_BATTERY = 3;  // Battery power
  POWER_SOURCE_DC = 4;       // DC source
  POWER_SOURCE_EMERGENCY = 5; // Emergency mains constantly powered
  POWER_SOURCE_EMERGENCY_DC = 6; // Emergency mains with transfer switch
}

// EndpointDescriptor describes a single endpoint on a Zigbee device.
message EndpointDescriptor {
  uint32 id = 1;                    // Endpoint ID (1-240)
  uint32 profile_id = 2;            // Application profile ID (e.g., 0x0104 for Home Automation)
  uint32 device_id = 3;             // Device ID within the profile
  uint32 device_version = 4;        // Device version
  repeated uint32 input_clusters = 5;   // List of input cluster IDs
  repeated uint32 output_clusters = 6;  // List of output cluster IDs
}

// DeviceCapabilities describes the capabilities of a Zigbee device.
message DeviceCapabilities {
  bool alternate_pan_coordinator = 1; // Device can become PAN coordinator
  bool receiver_on_when_idle = 2;     // Receiver stays on when idle
  bool security_capability = 3;        // Device supports security
}

// DeviceInterviewResult contains the results of a device interview.
// This message is sent to the router when a device interview completes (or fails).
message DeviceInterviewResult {
  string ieee_address = 1;           // 64-bit IEEE address in hex format (e.g., "0x00124b0037e6f451")
  uint32 network_address = 2;        // 16-bit network address
  InterviewState interview_state = 3; // Current interview state
  DeviceType device_type = 4;        // Device type (Coordinator/Router/EndDevice)
  uint32 manufacturer_id = 5;         // Manufacturer code
  string manufacturer_name = 6;       // Manufacturer name (from genBasic)
  string model_id = 7;                // Model ID (from genBasic)
  PowerSource power_source = 8;       // Power source
  uint32 zcl_version = 9;             // ZCL version
  uint32 application_version = 10;    // Application version
  uint32 stack_version = 11;          // Stack version
  uint32 hardware_version = 12;       // Hardware version
  string date_code = 13;              // Manufacturing date code
  string software_build_id = 14;      // Software build ID
  repeated EndpointDescriptor endpoints = 15; // List of endpoints and their clusters
  DeviceCapabilities capabilities = 16; // Device capabilities from node descriptor
}
