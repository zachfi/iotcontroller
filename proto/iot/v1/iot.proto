syntax = "proto3";

package iot.v1;

message UpdateDeviceResponse {}

// <discovery_prefix>/<component>/[<node_id>/]<object_id>/config
message DeviceDiscovery {
  string discovery_prefix = 1;
  string component = 2;
  string node_id = 3;
  string object_id = 4;
  repeated string endpoints = 5;
  bytes message = 6;
}

message UpdateDeviceRequest {
  string device = 1;
}

// TODO: implement
service IOTService {
  rpc UpdateDevice(UpdateDeviceRequest) returns (UpdateDeviceResponse);
}

message AlertRequest {
  string name = 1;
  string status = 2;
  string zone = 3;
}
message AlertResponse {}

message EpochRequest {
  string name = 1;
  string location = 2;
  int64 when = 3;
}
message EpochResponse {}


message ActivateConditionRequest {
  // condition is the name of the Condition resource to activate.
  string condition = 1;
}
message ActivateConditionResponse {}

service EventReceiverService {
  rpc Alert(AlertRequest) returns (AlertResponse);
  rpc Epoch(EpochRequest) returns (EpochResponse);
  rpc ActivateCondition(ActivateConditionRequest) returns (ActivateConditionResponse);
}

message SendRequest {
  string path = 1;
  bytes message = 2;
}
message SendResponse {}

service RouteService {
  rpc Send(SendRequest) returns (SendResponse);
}

enum ColorTemperature {
  COLOR_TEMPERATURE_UNSPECIFIED = 0;
  COLOR_TEMPERATURE_FIRSTLIGHT = 1;
  COLOR_TEMPERATURE_MORNING = 2;
  COLOR_TEMPERATURE_DAY = 3;
  COLOR_TEMPERATURE_LATEAFTERNOON = 4;
  COLOR_TEMPERATURE_EVENING = 5;
}

enum Brightness {
  BRIGHTNESS_UNSPECIFIED = 0;
  BRIGHTNESS_FULL = 1;
  BRIGHTNESS_DIM = 2;
  BRIGHTNESS_LOW = 3;
  BRIGHTNESS_DIMPLUS = 4;
  BRIGHTNESS_LOWPLUS = 5;
  BRIGHTNESS_VERYLOW = 6;
}

enum ZoneState {
  ZONE_STATE_UNSPECIFIED = 0;
  ZONE_STATE_ON = 1;
  ZONE_STATE_OFF = 2;
  ZONE_STATE_OFFTIMER = 3;
  ZONE_STATE_COLOR = 4;
  ZONE_STATE_RANDOMCOLOR = 5;
}

message SetStateResponse {}

message SetStateRequest {
  string name = 1; // The name of the zone
  ZoneState state = 2;
}

message SetSceneResponse {}

message SetSceneRequest {
  string name = 1; // The name of the zone
  string scene = 2;
}

message GetDeviceZoneRequest {
  string device = 1;
}

message GetDeviceZoneResponse {
  string zone = 1;
}

message ActionHandlerRequest {
  string event = 1;
  string device = 2;
  string zone = 3;
}

message ActionHandlerResponse {}

message SelfAnnounceRequest {
  string device = 1;
  string zone = 2;
}

message SelfAnnounceResponse {}

message OccupancyHandlerRequest {
  string device = 1;
  string zone = 2;
}

message OccupancyHandlerResponse {}

service ZoneKeeperService {
  rpc SetState(SetStateRequest) returns (SetStateResponse);
  rpc SetScene(SetSceneRequest) returns (SetSceneResponse);
  rpc GetDeviceZone(GetDeviceZoneRequest) returns (GetDeviceZoneResponse);
  rpc ActionHandler(ActionHandlerRequest) returns (ActionHandlerResponse);
  rpc SelfAnnounce(SelfAnnounceRequest) returns (SelfAnnounceResponse);
  rpc OccupancyHandler(OccupancyHandlerRequest) returns (OccupancyHandlerResponse);
}

// ZigbeeCommandService allows callers (e.g. ZoneKeeper) to send commands to
// Zigbee devices via the coordinator. The coordinator translates these into
// ZCL frames and transmits them over the dongle.
//
// This service is implemented by the ZigbeeCoordinator module and consumed by
// the ZoneKeeper module. It works regardless of whether the coordinator is local
// or remote (gRPC makes it location-transparent).
service ZigbeeCommandService {
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);
}

// SendCommandRequest carries a high-level Zigbee device command.
// The coordinator translates the command into ZCL bytes and sends via the dongle.
message SendCommandRequest {
  // IEEE address of the target device (hex, e.g. "0x00124b0037e6f451").
  string ieee_address = 1;
  // Destination endpoint (default: 1).
  uint32 endpoint = 2;
  // Command to send.
  oneof command {
    ZigbeeCommandOn on = 10;
    ZigbeeCommandOff off = 11;
    ZigbeeCommandToggle toggle = 12;
    ZigbeeCommandSetBrightness set_brightness = 13;
    ZigbeeCommandSetColorTemp set_color_temp = 14;
  }
}

message SendCommandResponse {
  bool success = 1;
  string error = 2;
}

message ZigbeeCommandOn {}
message ZigbeeCommandOff {}
message ZigbeeCommandToggle {}

message ZigbeeCommandSetBrightness {
  // Brightness level 0–254.
  uint32 level = 1;
  // Transition time in 1/10 seconds (default: 8 = 0.8s).
  uint32 transition_time = 2;
}

message ZigbeeCommandSetColorTemp {
  // Color temperature in mireds (e.g. 250 = 4000K warm white).
  uint32 color_temperature_mired = 1;
  // Transition time in 1/10 seconds (default: 8 = 0.8s).
  uint32 transition_time = 2;
}

message Device {
  string name = 1;
  DeviceType type = 2;
  // ieee_address is the stable 64-bit IEEE MAC address (hex, e.g. "00124b0037e6f451").
  // Populated from the Device CRD spec when available; required by the native Zigbee handler.
  string ieee_address = 3;
}

// TODO: consider this approach.  A device likely shouldn't have a type at all,
// since devices "expose" certain functionality, which can mix between clean
// lines of a device type.  A motion sensor might also expose temperature.  It
// would be a considerable refactor, but likely worth it.  If we receive an
// "action", we could select the devices to inform based on their exposures,
// rather than their type.

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_COORDINATOR = 1;
  DEVICE_TYPE_BASIC_LIGHT = 2;
  DEVICE_TYPE_COLOR_LIGHT = 3;
  DEVICE_TYPE_RELAY = 4;
  DEVICE_TYPE_LEAK = 5;
  DEVICE_TYPE_BUTTON = 6;
  DEVICE_TYPE_MOISTURE = 7;
  DEVICE_TYPE_TEMPERATURE = 8;
  DEVICE_TYPE_MOTION = 9;
  DEVICE_TYPE_ISPINDEL = 10;
  DEVICE_TYPE_SOIL = 11;
  DEVICE_TYPE_AIR_QUALITY = 12;
  DEVICE_TYPE_ROUTER = 13;
}
