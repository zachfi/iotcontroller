# Example Bindings for the Third Reality Smart Button (3RSB22BZ)
#
# A Binding maps a normalized device event to a Condition. When the event
# fires from a device matching the selector, the Condition's remediations
# are applied. This replaces hardcoded action strings in the router.
#
# This example targets a single device by IEEE address — the most specific
# selector form. Other forms (DeviceType, Zone, Device-name, LabelSelector)
# allow fleet defaults and overrides; specificity is summed across selector
# fields and the highest-scoring Binding wins.
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: button-bedside-zach-on
  namespace: iot
spec:
  event:
    property: action
    value: "on"
    selector:
      ieee: "0xffffb40e06036411"
  condition: bedside-zach-on
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: button-bedside-zach-off
  namespace: iot
spec:
  event:
    property: action
    value: "off"
    selector:
      ieee: "0xffffb40e06036411"
  condition: bedside-zach-off
---
# Example Conditions activated by the bindings above.
# active_scene references a Scene resource; active_state sets zone power state.
apiVersion: iot.iot/v1
kind: Condition
metadata:
  name: bedside-zach-on
  namespace: iot
spec:
  enabled: true
  remediations:
    - zone: bedside-zach
      active_state: ZONE_STATE_ON
---
apiVersion: iot.iot/v1
kind: Condition
metadata:
  name: bedside-zach-off
  namespace: iot
spec:
  enabled: true
  remediations:
    - zone: bedside-zach
      active_state: ZONE_STATE_OFF
