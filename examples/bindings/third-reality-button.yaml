# Example Bindings + Conditions for the Third Reality Smart Button
# (3RSB22BZ). This is a single-button remote that exposes the actions
# single / double / hold. The three Bindings below cover the full
# default convention documented in README.md:
#
#   single → toggle    (predictable, doesn't depend on remembering state)
#   double → on, full  (decisive "lights up")
#   hold   → on, dim   (decisive "soft light")
#
# Replace the IEEE address and zone name to match your deployment.
# The Condition resources defined below are reusable across every
# button targeting the same zone — bind multiple devices to the same
# Condition rather than duplicating Conditions per device.
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: button-bedside-zach-single
  namespace: iot
spec:
  event:
    property: action
    value: single
    selector:
      ieee: "0xffffb40e06036411"
  condition: bedside-zach-toggle
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: button-bedside-zach-double
  namespace: iot
spec:
  event:
    property: action
    value: double
    selector:
      ieee: "0xffffb40e06036411"
  condition: bedside-zach-full
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: button-bedside-zach-hold
  namespace: iot
spec:
  event:
    property: action
    value: hold
    selector:
      ieee: "0xffffb40e06036411"
  condition: bedside-zach-dim
---
# The three target Conditions. Reuse these across any button targeting
# the bedside-zach zone — that's the whole point of decoupling
# Bindings from Conditions.
apiVersion: iot.iot/v1
kind: Condition
metadata:
  name: bedside-zach-toggle
  namespace: iot
spec:
  enabled: true
  remediations:
    - zone: bedside-zach
      active_state: toggle      # ← resolves to on/off based on current zone state
---
apiVersion: iot.iot/v1
kind: Condition
metadata:
  name: bedside-zach-full
  namespace: iot
spec:
  enabled: true
  remediations:
    - zone: bedside-zach
      active_state: on
      active_scene: full-bright # ← Scene CR; brightness=FULL, colorTemp=DAY
---
apiVersion: iot.iot/v1
kind: Condition
metadata:
  name: bedside-zach-dim
  namespace: iot
spec:
  enabled: true
  remediations:
    - zone: bedside-zach
      active_state: on
      active_scene: dim         # ← Scene CR; brightness=DIM
