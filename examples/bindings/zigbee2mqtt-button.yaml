# Example Bindings for a button device managed by zigbee2mqtt.
#
# A Binding maps a normalized device event (property + value) to a Condition.
# Both transports — zigbee2mqtt MQTT and the native Zigbee dongle — produce
# the same DeviceEvent shape, so a single Binding works regardless of how
# the device joined the network.
#
# zigbee2mqtt publishes per-device JSON payloads like:
#   {"action": "single", "battery": 95, "linkquality": 182}
# This decodes to event.property=action, event.value=single. The Binding's
# selector below restricts the match to one specific device.
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: z2m-button-living-area-on
  namespace: iot
spec:
  event:
    property: action
    value: single
    selector:
      device: my-button
  condition: living-area-on
---
apiVersion: iot.iot/v1
kind: Binding
metadata:
  name: z2m-button-living-area-off
  namespace: iot
spec:
  event:
    property: action
    value: double
    selector:
      device: my-button
  condition: living-area-off
